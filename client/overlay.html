<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SayIt Overlay</title>
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      background: transparent !important;
      overflow: hidden;
      /* 必须撑满窗口高度，否则 Overlay 根节点的 h-full/items-end 失效，
         内容会贴窗口顶部；流式气泡让窗口变高时就会整体上移。 */
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/overlay/main.tsx"></script>
</body>
</html>
